<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--ds-paper); }
  .stack { display: grid; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .label { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3); width: 110px; flex: none; }
  .hero { font-family: var(--ds-font-display); font-weight: 800; font-size: 64px; letter-spacing: -0.02em; line-height: 1; color: var(--ds-ink); }
  .h1 { font-family: var(--ds-font-display); font-weight: 700; font-size: 40px; letter-spacing: -0.02em; line-height: 1.05; color: var(--ds-ink); }
  .h2 { font-family: var(--ds-font-display); font-weight: 700; font-size: 28px; letter-spacing: -0.01em; line-height: 1.1; color: var(--ds-ink); }
</style>
</head><body>
<div class="stack">
  <div class="row"><span class="label">Hero · 800 · 64</span><span class="hero">devspiration</span></div>
  <div class="row"><span class="label">H1 · 700 · 40</span><span class="h1">Guide to a branded deck</span></div>
  <div class="row"><span class="label">H2 · 700 · 28</span><span class="h2">From the marketing team</span></div>
</div>
</body></html>
