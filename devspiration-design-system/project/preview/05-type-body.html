<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--ds-paper); }
  .stack { display: grid; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .label { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-fg-3); width: 110px; flex: none; }
  .lead { font-size: 22px; line-height: 1.4; color: var(--ds-ink-2); max-width: 540px; }
  .body { font-size: 16px; line-height: 1.5; color: var(--ds-ink); max-width: 540px; }
  .cap { font-size: 14px; color: var(--ds-ink-3); }
  .mono { font-family: var(--ds-font-mono); font-size: 13px; color: var(--ds-ink-2); }
</style>
</head><body>
<div class="stack">
  <div class="row"><span class="label">Lead · 400 · 22</span><span class="lead">Designed to keep every deck consistent without slowing anyone down.</span></div>
  <div class="row"><span class="label">Body · 400 · 16</span><span class="body">Body copy stays calm — short sentences, sentence case, em-dash for asides, curly quotes.</span></div>
  <div class="row"><span class="label">Caption · 400 · 14</span><span class="cap">Caption / metadata · #8A8A8A</span></div>
  <div class="row"><span class="label">Mono · 400 · 13</span><span class="mono">--ds-blue: #1B9CF8</span></div>
</div>
</body></html>
