<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Type ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--ds-paper); font-family: var(--ds-font-sans); color: var(--ds-ink); }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--ds-line); }
  th { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; color: var(--ds-ink-3); font-weight: 700; }
  td.spec { font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-ink-2); }
  td.sample { line-height: 1; }
</style>
</head><body>
<table>
  <tr><th>Token</th><th>Spec</th><th>Sample</th></tr>
  <tr><td class="spec">--ds-text-xs</td><td class="spec">12 / 400</td><td class="sample" style="font-size:12px">Aa devspiration</td></tr>
  <tr><td class="spec">--ds-text-sm</td><td class="spec">14 / 400</td><td class="sample" style="font-size:14px">Aa devspiration</td></tr>
  <tr><td class="spec">--ds-text-base</td><td class="spec">16 / 400</td><td class="sample" style="font-size:16px">Aa devspiration</td></tr>
  <tr><td class="spec">--ds-text-md</td><td class="spec">18 / 700</td><td class="sample" style="font-size:18px;font-weight:700">Aa devspiration</td></tr>
  <tr><td class="spec">--ds-text-lg</td><td class="spec">22 / 400</td><td class="sample" style="font-size:22px">Aa devspiration</td></tr>
  <tr><td class="spec">--ds-text-xl</td><td class="spec">28 / 700</td><td class="sample" style="font-size:28px;font-weight:700;letter-spacing:-0.01em">Aa devspiration</td></tr>
  <tr><td class="spec">--ds-text-2xl</td><td class="spec">36 / 700</td><td class="sample" style="font-size:36px;font-weight:700;letter-spacing:-0.02em">Aa</td></tr>
</table>
</body></html>
