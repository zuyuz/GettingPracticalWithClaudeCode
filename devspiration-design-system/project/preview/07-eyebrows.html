<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Eyebrow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--ds-paper); display: flex; flex-direction: column; gap: 18px; }
  .eyebrow { font-family: var(--ds-font-sans); font-weight: 700; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ds-blue); }
  .eyebrow-ink { color: var(--ds-ink-3); }
  .title { font-family: var(--ds-font-display); font-weight: 700; font-size: 32px; line-height: 1.05; letter-spacing: -0.02em; color: var(--ds-ink); margin-top: 6px; }
  .pair { padding: 14px 16px; border-radius: 12px; background: var(--ds-paper); border: 1px solid var(--ds-line); }
  .pair.dark { background: var(--ds-ink); }
  .pair.dark .eyebrow { color: var(--ds-blue); }
  .pair.dark .title { color: var(--ds-paper); }
</style>
</head><body>
<div class="pair">
  <div class="eyebrow">Section 01 · Brand</div>
  <div class="title">Visual foundations</div>
</div>
<div class="pair dark">
  <div class="eyebrow">Section 02 · Motion</div>
  <div class="title">How things move</div>
</div>
</body></html>
