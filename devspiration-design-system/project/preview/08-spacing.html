<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 22px; background: var(--ds-paper); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .tok { font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-ink-2); width: 70px; flex: none; }
  .px  { font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-ink-3); width: 44px; flex: none; }
  .bar { height: 14px; background: linear-gradient(90deg,#1B9CF8,#8ACFF5); border-radius: 4px; }
</style>
</head><body>
  <div class="row"><span class="tok">space-1</span><span class="px">4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="tok">space-2</span><span class="px">8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="tok">space-3</span><span class="px">12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="tok">space-4</span><span class="px">16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="tok">space-5</span><span class="px">24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="tok">space-6</span><span class="px">32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="tok">space-7</span><span class="px">48</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="tok">space-8</span><span class="px">64</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="tok">space-9</span><span class="px">96</span><span class="bar" style="width:96px"></span></div>
  <div class="row"><span class="tok">space-10</span><span class="px">128</span><span class="bar" style="width:128px"></span></div>
</body></html>
