<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--ds-paper); font-family: var(--ds-font-sans); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .cell { aspect-ratio: 1/1; background: var(--ds-blue); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; color: #fff; font-family: var(--ds-font-mono); font-size: 10px; }
</style>
</head><body>
<div class="grid">
  <div class="cell" style="border-radius:4px">xs · 4</div>
  <div class="cell" style="border-radius:8px">sm · 8</div>
  <div class="cell" style="border-radius:12px">md · 12</div>
  <div class="cell" style="border-radius:16px">lg · 16</div>
  <div class="cell" style="border-radius:24px">xl · 24</div>
  <div class="cell" style="border-radius:32px">2xl · 32</div>
  <div class="cell" style="border-radius:999px">pill</div>
</div>
</body></html>
