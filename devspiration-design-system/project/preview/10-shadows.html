<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Shadow system</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 22px 32px; background: var(--ds-mist); font-family: var(--ds-font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .card { background: #fff; border-radius: 12px; aspect-ratio: 1/0.7; display: flex; align-items: flex-end; padding: 10px 12px; font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-ink-2); }
  .e1 { box-shadow: 0 1px 2px rgba(48,48,48,.06), 0 1px 1px rgba(48,48,48,.04); }
  .e2 { box-shadow: 0 4px 12px rgba(48,48,48,.08), 0 1px 2px rgba(48,48,48,.05); }
  .e3 { box-shadow: 0 12px 32px rgba(48,48,48,.10), 0 2px 6px rgba(48,48,48,.06); }
  .blue { box-shadow: 0 8px 28px rgba(27,156,248,.28); background: #1B9CF8; color: #fff; }
</style>
</head><body>
<div class="grid">
  <div class="card e1">shadow-1</div>
  <div class="card e2">shadow-2</div>
  <div class="card e3">shadow-3</div>
  <div class="card blue">shadow-blue</div>
</div>
</body></html>
