<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Motion · easing & duration</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 22px; background: var(--ds-paper); font-family: var(--ds-font-sans); color: var(--ds-ink); }
  .row { display: grid; grid-template-columns: 90px 70px 1fr; gap: 12px; align-items: center; margin: 10px 0; }
  .name { font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-ink); }
  .dur  { font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-ink-3); }
  .track { height: 8px; background: var(--ds-line); border-radius: 999px; position: relative; overflow: hidden; }
  .dot { position: absolute; top: -3px; height: 14px; width: 14px; border-radius: 50%; background: var(--ds-blue); }
  @keyframes ease-out   { 0%{left:0} 100%{left:calc(100% - 14px)} }
  .ease-out  { animation: ease-out 220ms cubic-bezier(.2,.8,.2,1) infinite alternate; }
  .ease-glass{ animation: ease-out 900ms cubic-bezier(.16,1,.3,1) infinite alternate; }
  .ease-inout{ animation: ease-out 420ms cubic-bezier(.65,0,.35,1) infinite alternate; }
  .ease-fast { animation: ease-out 140ms cubic-bezier(.2,.8,.2,1) infinite alternate; }
</style>
</head><body>
  <div class="row"><span class="name">fast</span><span class="dur">140ms</span><span class="track"><span class="dot ease-fast"></span></span></div>
  <div class="row"><span class="name">out</span><span class="dur">220ms</span><span class="track"><span class="dot ease-out"></span></span></div>
  <div class="row"><span class="name">in-out</span><span class="dur">420ms</span><span class="track"><span class="dot ease-inout"></span></span></div>
  <div class="row"><span class="name">glass</span><span class="dur">900ms</span><span class="track"><span class="dot ease-glass"></span></span></div>
</body></html>
