<!doctype html><html lang="en"><head><meta charset="utf-8"><title>3D brand objects · variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--ds-paper); font-family: var(--ds-font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  .tile { aspect-ratio: 4/3; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .tile.light { background: #FBFBFC; border: 1px solid var(--ds-line); }
  .tile.dark  { background: var(--ds-ink); }
  .tile img { max-width: 80%; max-height: 86%; object-fit: contain; }
  .lbl { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-ink-3); padding: 4px 6px; }
</style>
</head><body>
<div class="grid">
  <div class="tile light"><img src="../assets/brand-objects/3d-a-light.png"></div>
  <div class="tile dark"><img src="../assets/brand-objects/3d-a-dark.png"></div>
  <div class="tile light"><img src="../assets/brand-objects/3d-asterisk-blue.png"></div>
  <div class="tile dark"><img src="../assets/brand-objects/3d-asterisk-black.png"></div>
  <div class="tile light"><img src="../assets/brand-objects/3d-sphere-blue.png"></div>
  <div class="tile light"><img src="../assets/brand-objects/3d-sphere-clear.png"></div>
  <div class="tile light"><img src="../assets/brand-objects/3d-square-glass.png"></div>
  <div class="tile dark"><img src="../assets/brand-objects/3d-square-glass.png"></div>
</div>
</body></html>
