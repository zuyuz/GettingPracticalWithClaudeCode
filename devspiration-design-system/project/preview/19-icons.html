<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--ds-paper); font-family: var(--ds-font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 14px; border: 1px solid var(--ds-line); border-radius: 12px; }
  .tile img { width: 44px; height: 44px; }
  .name { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-ink-3); }
</style>
</head><body>
<div class="grid">
  <div class="tile"><img src="../assets/icons/icon-book.svg"><span class="name">book</span></div>
  <div class="tile"><img src="../assets/icons/icon-document.svg"><span class="name">document</span></div>
  <div class="tile"><img src="../assets/icons/icon-flag.svg"><span class="name">flag</span></div>
  <div class="tile"><img src="../assets/icons/icon-lightning.svg"><span class="name">lightning</span></div>
</div>
</body></html>
