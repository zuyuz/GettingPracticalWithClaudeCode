<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Docs · top nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--ds-paper); }
  .nav {
    height: 56px;
    display: flex; align-items: center; gap: 28px;
    padding: 0 20px;
    border-bottom: 1px solid var(--ds-line);
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(8px);
    font-family: var(--ds-font-sans);
  }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; }
  .brand img { height: 18px; }
  .tag { font-size: 10px; padding: 1px 6px; background: #E7F3FD; color: #0E70B8; border-radius: 999px; font-weight: 700; }
  nav { display: flex; gap: 20px; margin-left: 12px; }
  nav a { font-size: 13px; color: var(--ds-ink-2); text-decoration: none; font-weight: 600; padding: 4px 0; border-bottom: 2px solid transparent; }
  nav a.on { color: var(--ds-ink); border-bottom-color: var(--ds-blue); }
  .search {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    background: var(--ds-mist); border: 1px solid var(--ds-line);
    padding: 6px 10px; border-radius: 8px;
    font-size: 12px; color: var(--ds-ink-3);
  }
  .search .k { font-family: var(--ds-font-mono); font-size: 10px; padding: 1px 5px; background: #fff; border: 1px solid var(--ds-line); border-radius: 3px; }
</style></head>
<body>
  <div class="nav">
    <div class="brand"><img src="../assets/logo/devspiration-wordmark.png" alt=""><span class="tag">DOCS</span></div>
    <nav>
      <a class="on">Guide</a>
      <a>Components</a>
      <a>Patterns</a>
      <a>Changelog</a>
    </nav>
    <div class="search">Search · <span class="k">⌘K</span></div>
  </div>
</body></html>
