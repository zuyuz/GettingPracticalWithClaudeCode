<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Docs · sidebar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px 20px; background: var(--ds-paper); font-family: var(--ds-font-sans); }
  .grp { margin-bottom: 14px; }
  .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; font-weight: 700; color: var(--ds-ink-3); margin-bottom: 6px; }
  a { display: block; padding: 5px 10px; margin: 0 -10px; border-radius: 6px; color: var(--ds-ink-2); font-size: 13px; text-decoration: none; line-height: 1.4; }
  a:hover { background: var(--ds-mist); color: var(--ds-ink); }
  a.on { background: #E7F3FD; color: #0E70B8; font-weight: 700; }
  .new { float: right; font-size: 9px; padding: 1px 5px; border-radius: 999px; background: var(--ds-blue); color: #fff; font-weight: 700; }
  .col { columns: 2; column-gap: 36px; }
</style></head>
<body>
  <div class="col">
    <div class="grp">
      <div class="lbl">Foundations</div>
      <a class="on">Colors</a>
      <a>Typography</a>
      <a>3D props</a>
      <a>Layout</a>
      <a>Motion <span class="new">new</span></a>
    </div>
    <div class="grp">
      <div class="lbl">Components</div>
      <a>Callouts</a>
      <a>Code blocks</a>
      <a>Cards</a>
      <a>Tabs</a>
    </div>
  </div>
</body></html>
