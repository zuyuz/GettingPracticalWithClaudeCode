<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Docs · code block</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--ds-paper); font-family: var(--ds-font-sans); }
  .cb { background: #FAFAFB; border: 1px solid var(--ds-line); border-radius: 10px; overflow: hidden; }
  .head { display: flex; align-items: center; padding: 8px 12px; background: #fff; border-bottom: 1px solid var(--ds-line); font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-ink-2); }
  .head .lang { font-weight: 700; color: var(--ds-ink); }
  .head .copy { margin-left: auto; font-size: 10px; padding: 3px 7px; background: var(--ds-mist); border-radius: 4px; color: var(--ds-ink-2); }
  pre { margin: 0; padding: 12px 14px; font-family: var(--ds-font-mono); font-size: 12px; line-height: 1.65; color: var(--ds-ink); }
  .tk-key { color: #0E70B8; }
  .tk-val { color: #1A7F4D; }
  .tk-com { color: var(--ds-ink-3); font-style: italic; }
  .tk-str { color: #B45309; }
</style></head>
<body>
  <div class="cb">
    <div class="head"><span class="lang">css</span><span class="copy">Copy</span></div>
<pre><span class="tk-com">/* drop these into your stylesheet */</span>
<span class="tk-key">:root</span> {
  --ds-blue:  <span class="tk-val">#1B9CF8</span>;
  --ds-ink:   <span class="tk-val">#303030</span>;
  --ds-font:  <span class="tk-str">"Nunito"</span>;
}</pre>
  </div>
</body></html>
