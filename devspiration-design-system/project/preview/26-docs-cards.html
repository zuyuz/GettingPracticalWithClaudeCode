<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Docs · card grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--ds-paper); font-family: var(--ds-font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card {
    display: block;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid var(--ds-line);
    background: #fff;
    text-decoration: none;
    color: var(--ds-ink);
    transition: border 200ms ease, transform 200ms ease, box-shadow 200ms ease;
  }
  .card:hover { border-color: var(--ds-blue); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(27,156,248,.10); }
  .ico { width: 28px; height: 28px; border-radius: 7px; background: #E7F3FD; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .ico img { width: 16px; height: 16px; }
  b { display: block; font-size: 13.5px; font-weight: 700; letter-spacing: -0.005em; }
  span.d { font-size: 12px; color: var(--ds-ink-2); line-height: 1.5; display: block; margin-top: 2px; }
  .arr { display: inline-block; margin-top: 8px; font-size: 11.5px; font-weight: 700; color: var(--ds-blue); }
</style></head>
<body>
  <div class="grid">
    <a class="card"><span class="ico"><img src="../assets/icons/icon-lightning.svg"></span><b>Quickstart</b><span class="d">Spin up a deck in five minutes.</span><span class="arr">Read →</span></a>
    <a class="card"><span class="ico"><img src="../assets/icons/icon-book.svg"></span><b>The prop library</b><span class="d">16 glossy 3D objects, ready to drop in.</span><span class="arr">Browse →</span></a>
    <a class="card"><span class="ico"><img src="../assets/icons/icon-document.svg"></span><b>CSS tokens</b><span class="d">Every variable in one file.</span><span class="arr">View →</span></a>
    <a class="card"><span class="ico"><img src="../assets/icons/icon-flag.svg"></span><b>Report an issue</b><span class="d">Ping marketing on Slack.</span><span class="arr">Open →</span></a>
  </div>
</body></html>
