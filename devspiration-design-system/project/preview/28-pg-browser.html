<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Browser frame</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../playground.css">
<style>
  body { margin: 0; padding: 14px; background: var(--ds-mist); }
  .pg-frame { height: 280px; }
  .demo { padding: 20px 22px; background: #fff; height: 100%; box-sizing: border-box; font-family: var(--ds-font-sans); }
  .demo .ey { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--pg-accent); }
  .demo h1 { font-family: var(--ds-font-display); font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin: 6px 0 6px; line-height: 1.1; }
  .demo p  { font-size: 12px; color: var(--ds-ink-2); line-height: 1.5; margin: 0; }
</style></head>
<body>
  <div class="pg-frame theme-light pg-browser">
    <div class="pg-titlebar">
      <div class="lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="title">Devspiration · brand guide</div>
      <div class="meta"></div>
    </div>
    <div class="pg-tabs">
      <div class="tab on"><span class="fav"></span>Brand guide</div>
      <div class="tab"><span class="fav" style="background:#8ACFF5"></span>Q4 deck</div>
    </div>
    <div class="pg-addressbar">
      <div class="nav">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="url"><svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><span class="scheme">https://</span>devspiration.io/guide</div>
    </div>
    <div class="pg-body" style="padding:0">
      <div class="demo">
        <div class="ey">From the marketing team</div>
        <h1>Building decks the<br>Devspiration way.</h1>
        <p>A short, opinionated guide to staying on brand without slowing down.</p>
      </div>
    </div>
  </div>
</body></html>
