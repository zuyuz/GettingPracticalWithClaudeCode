<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Editor frame</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../playground.css">
<style>
  body { margin: 0; padding: 14px; background: var(--ds-mist); }
  .pg-frame { height: 280px; }
  .pg-editor .pg-body { padding: 12px 0; font-size: 12px; line-height: 1.55; }
  .pg-editor .gutter { padding-right: 8px; font-size: 11px; }
  .pg-editor .code  { padding: 0 12px; }
</style></head>
<body>
  <div class="pg-frame theme-dark pg-editor">
    <div class="pg-titlebar">
      <div class="lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="title">motion.css — Devspiration</div>
      <div class="meta">css</div>
    </div>
    <div class="pg-body">
      <div class="gutter">
<span class="ln">38</span><span class="ln">39</span><span class="ln">40</span><span class="ln">41</span><span class="ln">42</span><span class="ln">43</span><span class="ln">44</span><span class="ln">45</span>
      </div>
      <div class="code">
<span class="ln"><span class="pg-tk-com">/* glass-settle entrance */</span></span>
<span class="ln"><span class="pg-tk-fn">.m-rise</span> <span class="pg-tk-tag">{</span></span>
<span class="ln">  <span class="pg-tk-key">opacity</span>: <span class="pg-tk-num">0</span>;</span>
<span class="ln">  <span class="pg-tk-key">transform</span>: <span class="pg-tk-fn">translateY</span>(<span class="pg-tk-num">24px</span>);</span>
<span class="ln"><span class="pg-tk-tag">}</span></span>
<span class="ln add">  <span class="pg-tk-key">transition</span>: <span class="pg-tk-num">560ms</span> <span class="pg-tk-key">cubic-bezier</span>(<span class="pg-tk-num">.16,1,.3,1</span>);</span>
<span class="ln del">  <span class="pg-tk-key">transition</span>: <span class="pg-tk-num">.4s</span> <span class="pg-tk-key">ease</span>;</span>
<span class="ln cur"><span class="pg-tk-tag">}</span></span>
      </div>
    </div>
  </div>
</body></html>
